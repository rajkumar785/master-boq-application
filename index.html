<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Smart SMM7 Construction Estimating Platform</title>
  <link rel="stylesheet" href="./css/styles.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="app" id="appRoot">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar__brand">
        <div class="brand__title">Smart SMM7</div>
        <div class="brand__subtitle">Construction Estimating Platform</div>
      </div>

      <nav class="nav" aria-label="Primary">
        <a class="nav__item" href="#/dashboard" data-route>Dashboard</a>
        <a class="nav__item" href="#/projects" data-route>Project Management</a>
        <a class="nav__item" href="#/library" data-route>SMM7 Item Library</a>
        <a class="nav__item" href="#/takeoff" data-route>Drawing Takeoff</a>
        <a class="nav__item" href="#/boq" data-route>BOQ Generator</a>
        <a class="nav__item" href="#/rate" data-route>Rate Analysis</a>
        <a class="nav__item" href="#/materials" data-route>Material Takeoff</a>
        <a class="nav__item" href="#/rebar" data-route>Rebar Schedule</a>
        <a class="nav__item" href="#/concrete" data-route>Concrete Mix</a>
        <a class="nav__item" href="#/variations" data-route>Variation Management</a>
        <a class="nav__item" href="#/progress" data-route>Progress Tracking</a>
        <a class="nav__item" href="#/cashflow" data-route>Cash Flow Forecast</a>
        <a class="nav__item" href="#/reports" data-route>Reports</a>
      </nav>

      <div class="sidebar__footer">
        <button class="btn btn--secondary" id="btnExportBackup" type="button">Export Backup</button>
        <label class="btn btn--secondary" for="importBackupFile">Import Backup</label>
        <input id="importBackupFile" class="sr-only" type="file" accept="application/json" />
      </div>
    </aside>

    <main class="main">
      <header class="topbar">
        <button class="icon-btn topbar__menu" id="btnToggleSidebar" type="button" aria-label="Toggle sidebar">
          <span class="icon">☰</span>
        </button>

        <div class="topbar__project">
          <div class="topbar__label">Active Project</div>
          <div class="topbar__value" id="activeProjectName">None</div>
        </div>

        <div class="topbar__actions">
          <button class="btn" id="btnNewProject" type="button">New Project</button>
        </div>
      </header>

      <section class="content" id="view"></section>

      <nav class="bottom-nav" aria-label="Mobile">
        <a href="#/dashboard" class="bottom-nav__item" data-route>Home</a>
        <a href="#/takeoff" class="bottom-nav__item" data-route>Takeoff</a>
        <a href="#/boq" class="bottom-nav__item" data-route>BOQ</a>
        <a href="#/reports" class="bottom-nav__item" data-route>Reports</a>
      </nav>
    </main>
  </div>

  <div class="modal" id="modal" aria-hidden="true">
    <div class="modal__backdrop" data-close-modal></div>
    <div class="modal__panel" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
      <div class="modal__header">
        <div class="modal__title" id="modalTitle">Modal</div>
        <button class="icon-btn" type="button" data-close-modal aria-label="Close">✕</button>
      </div>
      <div class="modal__body" id="modalBody"></div>
      <div class="modal__footer" id="modalFooter"></div>
    </div>
  </div>

  <script src="./js/vendor/pdfjs/pdf.min.js"></script>
  <script type="module" src="./js/app.js"></script>
</body>
</html>
